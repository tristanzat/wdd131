<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <meta name="author" content="Tristan Zatylny">
        <meta name="description" content="A dynamic recipe book webpage.">
        <link rel="stylesheet" href="styles.css">
        <script src="main.js" defer></script>

        <!-- Open Graph (Facebook, LinkedIn, etc.) -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Your Title">
        <meta property="og:description" content="Your Description">
        <meta property="og:url" content="Your URL">
        <meta property="og:image" content="social-preview-image.png">

        <!-- X Card -->
        <meta name="twitter:card" content="Social Preview Image">
        <meta name="twitter:title" content="Your Title">
        <meta name="twitter:description" content="Your Description">
        <meta name="twitter:image" content="social-preview-image.png">

        <!-- One favicon (ICO works everywhere) -->
        <link rel="icon" href="/favicon.ico">

        <!-- One Apple Touch Icon (iOS home screen) -->
        <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    </head>

    <body>
        <header>
            <img id="logo" src="images/recipe-book.png" alt="recipe book logo">
            <h1 id="title">RecipeBook</h1>
        </header>
        <main>
            <!-- Search bar -->
            <form class="search-bar" aria-label="search bar">
                <input type="text" id="search" name="recipeSearch" placeholder="Find a recipe">
                <button type="submit" id="search-button" aria-label="search button">
                    <img src="images/search.svg" alt="magnifying glass icon">
                </button>
            </form>
            <hr>
            <!-- Recipe items -->
            <div id="recipe-container">
                
            </div>
        </main>
        <footer>
            <div class="social">
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
                <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
                <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
                <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
            </div>
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
                Recipe icons created by Freepik - Flaticon
            </a>
        </footer>
    </body>
</html>
